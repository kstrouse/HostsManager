<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#34495e" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bg-gradient)" />
  
  <!-- Outer glowing ring -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="none" stroke="#bdc3c7" stroke-width="2" opacity="0.3" />

  <!-- Document Base representing the hosts UI/window -->
  <rect x="48" y="48" width="160" height="160" rx="12" fill="#ecf0f1" filter="url(#shadow)" />
  
  <!-- Document Header -->
  <path d="M48 60 C48 53.37 53.37 48 60 48 L196 48 C202.63 48 208 53.37 208 60 L208 76 L48 76 Z" fill="#bdc3c7" />
  
  <!-- Window Controls mimicking an app interface -->
  <circle cx="64" cy="62" r="5" fill="#e74c3c" />
  <circle cx="80" cy="62" r="5" fill="#f1c40f" />
  <circle cx="96" cy="62" r="5" fill="#2ecc71" />

  <!-- Hosts Line 1 -->
  <!-- Blue represents IP address, Grey represents Hostname -->
  <rect x="64" y="104" width="32" height="10" rx="4" fill="#3498db" />
  <rect x="104" y="104" width="44" height="10" rx="4" fill="#7f8c8d" />
  
  <!-- Toggle Switch 1 (Active/ON) -->
  <rect x="164" y="101" width="28" height="16" rx="8" fill="#2ecc71" />
  <circle cx="184" cy="109" r="6" fill="#ffffff" />

  <!-- Hosts Line 2 -->
  <rect x="64" y="136" width="24" height="10" rx="4" fill="#3498db" />
  <rect x="96" y="136" width="52" height="10" rx="4" fill="#7f8c8d" />
  
  <!-- Toggle Switch 2 (Inactive/OFF) -->
  <rect x="164" y="133" width="28" height="16" rx="8" fill="#95a5a6" />
  <circle cx="172" cy="141" r="6" fill="#ffffff" />

  <!-- Hosts Line 3 -->
  <rect x="64" y="168" width="40" height="10" rx="4" fill="#3498db" />
  <rect x="112" y="168" width="36" height="10" rx="4" fill="#7f8c8d" />
  
  <!-- Toggle Switch 3 (Active/ON) -->
  <rect x="164" y="165" width="28" height="16" rx="8" fill="#2ecc71" />
  <circle cx="184" cy="173" r="6" fill="#ffffff" />
</svg>
